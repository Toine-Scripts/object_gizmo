name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Web
        run: |
          cd web
          npm install
          npm run build

      - name: Prepare Release Files
        run: |
          mkdir -p release/object_gizmo/web
          cp -r client release/object_gizmo/
          cp fxmanifest.lua release/object_gizmo/
          cp README.md release/object_gizmo/
          cp -r web/dist release/object_gizmo/web/

      - name: Create ZIP
        run: |
          cd release
          zip -r ../object_gizmo.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: object_gizmo.zip
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}
            
            Build of the object_gizmo resource.
            
            ### Controls:
            - [W]: Translation Mode
            - [R]: Rotation Mode
            - [G]: Toggle Cursor
            - [LAlt]: Snap to Ground
            - [Enter]: Finish Editing
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
